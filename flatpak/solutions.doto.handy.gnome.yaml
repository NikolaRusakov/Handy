id: solutions.doto.handy
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: handy
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable:
      version: "25.08"
  - org.freedesktop.Sdk.Extension.llvm18:
      version: "24.08"
  # - org.freedesktop.Sdk.Extension.rust-stable//25.08

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm18/bin
  env:
    CARGO_HOME: /run/build/handy/cargo-home
    RUSTFLAGS: -C link-arg=-fuse-ld=lld
    LIBCLANG_PATH: /usr/lib/sdk/llvm18/lib
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=all
  - --filesystem=home
  - --filesystem=xdg-config/autostart:create
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.GlobalShortcuts
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.gnome.SessionManager
  - --talk-name=solutions.doto.handy.SingleInstance # Remember to change net_mydomain_MyApp to your app ID
  - --own-name=solutions.doto.handy.SingleInstance # Remember to change net_mydomain_MyApp to your app ID
modules:
  - dependencies.yaml

  # - name: libappindicator
  #   buildsystem: autotools
  #   config-opts:
  #     - --with-gtk=3
  #     - --disable-static
  #     - --disable-tests
  #     - --disable-gtk-doc
  #     - --disable-mono-test
  #     - --enable-introspection=no
  #   sources:
  #     - type: archive
  #       url: https://launchpad.net/libappindicator/12.10/12.10.0/+download/libappindicator-12.10.0.tar.gz
  #       sha256: d5907c1f98084acf28fd19593cb70672caa0ca1cf82d747ba6f4830d4cc3b49f
  - name: handy
    buildsystem: simple
    build-options:
      env:
        ORT_LIB_LOCATION: /app/lib
        ORT_PREFER_DYNAMIC_LINK: "1"
        WHISPER_NO_AVX: ON
        WHISPER_NO_AVX2: ON
        PKG_CONFIG_PATH: /app/lib/pkgconfig
        RUSTFLAGS: -C link-arg=-ljavascriptcoregtk-4.1
      build-args:
        - --share=network
        - --filesystem=host:rw
    build-commands:
      - rustc --version && cargo --version
      - BUN_DEBUG=network bun-download/bun install --omit=dev --frozen
      - bun-download/bun run build
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/handy /app/bin/handy
      - mkdir -p /app/lib/Handy/models
      - cp -r src-tauri/resources/ /app/lib/Handy/
      - ln -sf /app/share/handy/models/silero_vad_v4.onnx
        /app/lib/Handy/models/silero_vad_v4.onnx
      - install -Dm644 src-tauri/icons/128x128.png
        /app/share/icons/hicolor/128x128/apps/solutions.doto.handy.png
      - install -Dm644 src-tauri/icons/128x128@2x.png
        /app/share/icons/hicolor/256x256/apps/solutions.doto.handy.png
      - install -Dm644 src-tauri/icons/32x32.png
        /app/share/icons/hicolor/32x32/apps/solutions.doto.handy.png
      - install -Dm644 flatpak/solutions.doto.handy.desktop
        /app/share/applications/solutions.doto.handy.desktop
      - install -Dm644 flatpak/solutions.doto.handy.metainfo.xml
        /app/share/metainfo/solutions.doto.handy.metainfo.xml
    sources:
      - type: dir
        path: ..
      - type: archive
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.11/bun-linux-x64.zip
        sha256: 8611ba935af886f05a6f38740a15160326c15e5d5d07adef966130b4493607ed
        dest: bun-download
        strip-components: 1
