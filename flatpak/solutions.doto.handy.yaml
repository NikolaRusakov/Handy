id: solutions.doto.handy
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: handy
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/handy/cargo-home
    RUSTFLAGS: -C link-arg=-fuse-ld=lld
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=all
  - --filesystem=home
  - --filesystem=xdg-config/autostart:create
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.GlobalShortcuts
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.gnome.SessionManager
modules:
  # - name: gtk4-layer-shell
  #   buildsystem: meson
  #   sources:
  #     # no x-checker-data since this should be synchronized with Nix
  #     #
  #     # TODO: Automate this with check-zig-cache.sh
  #     - type: archive
  #       url: https://github.com/wmww/gtk4-layer-shell/archive/refs/tags/v1.1.0.tar.gz
  #       sha256: 98284281260a5eef5b4f63a55f16c4bf6a788a1020a6db037ecb0f71fa336988
  - name: webkit2gtk-4.1
    buildsystem: simple
    build-commands:
      - mkdir -p /tmp/jsc /tmp/wk /tmp/wkdev
      - sh -c 'SRCDIR=$(pwd); cd /tmp/jsc; ar x "$SRCDIR/libjavascriptcoregtk-4.1-0.deb"; tar xf data.tar.*'
      - sh -c 'SRCDIR=$(pwd); cd /tmp/wk; ar x "$SRCDIR/libwebkit2gtk-4.1-0.deb"; tar xf data.tar.*'
      - sh -c 'SRCDIR=$(pwd); cd /tmp/wkdev; ar x "$SRCDIR/libwebkit2gtk-4.1-dev.deb"; tar xf data.tar.*'
      - cp -rn /tmp/jsc/usr/lib/x86_64-linux-gnu/. /app/lib/
      - cp -rn /tmp/wk/usr/lib/x86_64-linux-gnu/. /app/lib/
      - mkdir -p /app/include /app/lib/pkgconfig
      - cp -rn /tmp/wkdev/usr/include/. /app/include/
      - find /tmp/wkdev/usr -name "*.pc" -exec cp {} /app/lib/pkgconfig/ \;
      - sed -i 's|/usr/lib/x86_64-linux-gnu|/app/lib|g; s|prefix=/usr|prefix=/app|g'
        /app/lib/pkgconfig/webkit2gtk-4.1.pc /app/lib/pkgconfig/javascriptcoregtk-4.1.pc
    sources:
      - type: file
        url: http://security.debian.org/debian-security/pool/updates/main/w/webkit2gtk/libjavascriptcoregtk-4.1-0_2.50.6-1~deb12u1_amd64.deb
        sha256: 754239f31aadb4119d5707fe8e5b6f10f798d050751052ec587193f5498435d5
        dest-filename: libjavascriptcoregtk-4.1-0.deb
      - type: file
        url: http://security.debian.org/debian-security/pool/updates/main/w/webkit2gtk/libwebkit2gtk-4.1-0_2.50.6-1~deb12u1_amd64.deb
        sha256: d60630e4011128af3d4fa382ea882c26906f8aae5289b151c95fd81535d59c04
        dest-filename: libwebkit2gtk-4.1-0.deb
      - type: file
        url: http://security.debian.org/debian-security/pool/updates/main/w/webkit2gtk/libwebkit2gtk-4.1-dev_2.50.6-1~deb12u1_amd64.deb
        sha256: 0cdcd610d849f144df9ec0a835a44f1d2fddaca75d13cd5990e64ca44d8b1ef8
        dest-filename: libwebkit2gtk-4.1-dev.deb
  - name: onnxruntime
    buildsystem: simple
    build-commands:
      - install -Dm755 lib/libonnxruntime.so.1.24.2
        /app/lib/libonnxruntime.so.1.24.2
      - ln -sf libonnxruntime.so.1.24.2 /app/lib/libonnxruntime.so.1
      - ln -sf libonnxruntime.so.1.24.2 /app/lib/libonnxruntime.so
    sources:
      - type: archive
        url: https://blob.handy.computer/onnxruntime-linux-x86_64-1.24.2.tgz
        sha256: 7e8062d5cda514fe3e31d805f9aabd50bed42d331994f66753d2dd697294b976
  - name: silero-vad-model
    buildsystem: simple
    build-commands:
      - install -Dm644 silero_vad_v4.onnx
        /app/share/handy/models/silero_vad_v4.onnx
    sources:
      - type: file
        url: https://blob.handy.computer/silero_vad_v4.onnx
        sha256: a35ebf52fd3ce5f1469b2a36158dba761bc47b973ea3382b3186ca15b1f5af28
        dest-filename: silero_vad_v4.onnx
  - name: handy
    buildsystem: simple
    build-options:
      env:
        ORT_LIB_LOCATION: /app/lib
        ORT_PREFER_DYNAMIC_LINK: "1"
        WHISPER_NO_AVX: ON
        WHISPER_NO_AVX2: ON
        PKG_CONFIG_PATH: /app/lib/pkgconfig
      build-args:
        - --share=network
        - --filesystem=host:rw
    build-commands:
      - BUN_DEBUG=network bun-download/bun install --omit=dev --frozen
      - bun-download/bun run build
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/handy /app/bin/handy
      - mkdir -p /app/bin/resources/models
      - cp -r src-tauri/resources/. /app/bin/resources/
      - ln -sf /app/share/handy/models/silero_vad_v4.onnx
        /app/bin/resources/models/silero_vad_v4.onnx
      - install -Dm644 src-tauri/icons/128x128.png
        /app/share/icons/hicolor/128x128/apps/solutions.doto.handy.png
      - install -Dm644 src-tauri/icons/128x128@2x.png
        /app/share/icons/hicolor/256x256/apps/solutions.doto.handy.png
      - install -Dm644 src-tauri/icons/32x32.png
        /app/share/icons/hicolor/32x32/apps/solutions.doto.handy.png
      - install -Dm644 flatpak/solutions.doto.handy.desktop
        /app/share/applications/solutions.doto.handy.desktop
      - install -Dm644 flatpak/solutions.doto.handy.metainfo.xml
        /app/share/metainfo/solutions.doto.handy.metainfo.xml
    sources:
      - type: dir
        path: ..
      - type: archive
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.11/bun-linux-x64.zip
        sha256: 8611ba935af886f05a6f38740a15160326c15e5d5d07adef966130b4493607ed
        dest: bun-download
        strip-components: 1
      - type: shell
        commands:
          - if [ -f cargo/config ]; then mkdir -p .cargo && cp -vf cargo/config
            .cargo/config.toml; fi
